<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אשף המכפלות - לוח הכפל</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --success: #22c55e;
            --highlight: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Heebo', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .main-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        /* Number Selection Grid */
        #selector-screen { display: block; }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .num-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .num-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Table Screen */
        #table-screen { display: none; }
        .m-table {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 4px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 15px;
            margin: 0 auto;
            max-width: 100%;
            overflow-x: auto;
        }
        .cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            padding: 8px 4px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }
        .cell.header {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            color: white;
        }
        .cell.highlight {
            background: var(--highlight);
            color: #0f172a;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }

        /* Game Screen */
        #game-screen { display: none; }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 12px;
        }
        .rabbit-bank { font-size: 1.2rem; display: flex; align-items: center; gap: 6px; color: #fbbf24; font-weight: bold; }
        .question { font-size: 4.5rem; margin: 20px 0; font-family: 'Outfit', sans-serif; font-weight: 700; }
        .input-area { display: flex; flex-direction: column; gap: 15px; max-width: 250px; margin: 0 auto; }
        #answer-input { background: rgba(255, 255, 255, 0.05); border: 3px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; font-size: 2.5rem; text-align: center; color: white; outline: none; }

        /* Results */
        #result-screen { display: none; }

        /* Rabbit Animation */
        .rabbit-sprite { position: absolute; font-size: 2rem; pointer-events: none; z-index: 100; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .error-shake { animation: shake 0.4s; border-color: var(--accent) !important; }

        @media (max-width: 600px) {
            .cell { padding: 4px 2px; font-size: 0.65rem; }
            h1 { font-size: 1.8rem; }
            .question { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- SELECTOR SCREEN -->
        <div id="selector-screen">
            <h1>אשף המכפלות</h1>
            <p class="subtitle">על אילו מספרים תרצו להתאמן?</p>
            <div class="number-grid" id="number-grid"></div>
            <button class="main-btn" id="to-table-btn">המשך ללוח הכפל</button>
        </div>

        <!-- TABLE SCREEN -->
        <div id="table-screen">
            <h1>לוח הכפל שלך</h1>
            <p class="subtitle">הנה המספרים שבחרת מודגשים. מוכנים?</p>
            <div class="m-table" id="multi-table"></div>
            <button class="main-btn" id="start-game-btn">אני מוכן, התחל משחק!</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen">
            <div class="stats-bar">
                <div id="progress-display">שאלה 1 מתוך 10</div>
                <div class="rabbit-bank">
                    <span id="rabbit-count">0</span> 🐰
                </div>
            </div>

            <div class="question" id="question-text">7 × 8</div>

            <div class="input-area">
                <input type="number" id="answer-input" placeholder="?" autocomplete="off">
                <button class="main-btn" id="check-btn" style="margin-top:0">בדוק</button>
            </div>
            
            <p id="feedback-text" style="height: 20px; margin-top: 10px; color: var(--accent); font-weight: bold;"></p>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen">
            <h1>איזו הצלחה!</h1>
            <div style="font-size: 4rem; margin: 20px 0;" id="final-rabbit-total">0 🐰</div>
            <p class="subtitle">אספתם המון ארנבים חדשים!</p>
            <button class="main-btn" onclick="location.reload()">משחק חדש</button>
        </div>
    </div>

    <script>
        const state = {
            selectedNumbers: [],
            currentQuestion: 0,
            rabbitTotal: 0,
            totalQuestions: 10,
            correctAnswer: null,
            canAnswer: true
        };

        const screens = {
            select: document.getElementById('selector-screen'),
            table: document.getElementById('table-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen')
        };

        const answerInput = document.getElementById('answer-input');

        // Init Selector
        const grid = document.getElementById('number-grid');
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.textContent = i;
            btn.onclick = () => {
                btn.classList.toggle('selected');
                const val = i;
                if (state.selectedNumbers.includes(val)) {
                    state.selectedNumbers = state.selectedNumbers.filter(n => n !== val);
                } else {
                    state.selectedNumbers.push(val);
                }
            };
            grid.appendChild(btn);
        }

        // Logic flow
        document.getElementById('to-table-btn').onclick = () => {
            if (state.selectedNumbers.length === 0) {
                alert('אנא בחרו לפחות מספר אחד!');
                return;
            }
            buildTable();
            showScreen('table');
        };

        document.getElementById('start-game-btn').onclick = () => {
            showScreen('game');
            nextQuestion();
        };

        function showScreen(name) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            screens[name].style.display = 'block';
            if(name === 'game') setTimeout(() => answerInput.focus(), 100);
        }

        function buildTable() {
            const container = document.getElementById('multi-table');
            container.innerHTML = '';
            
            // Header Row
            container.appendChild(createCell('×', 'header'));
            for(let i=1; i<=10; i++) container.appendChild(createCell(i, 'header'));

            for(let r=1; r<=10; r++) {
                // Header Col
                container.appendChild(createCell(r, 'header'));
                
                for(let c=1; c<=10; c++) {
                    const result = r * c;
                    const isHighlighted = state.selectedNumbers.includes(r) || state.selectedNumbers.includes(c);
                    container.appendChild(createCell(result, isHighlighted ? 'highlight' : ''));
                }
            }
        }

        function createCell(text, className) {
            const div = document.createElement('div');
            div.className = 'cell ' + className;
            div.textContent = text;
            return div;
        }

        function nextQuestion() {
            if (state.currentQuestion >= state.totalQuestions) {
                showScreen('result');
                document.getElementById('final-rabbit-total').textContent = `${state.rabbitTotal} 🐰`;
                return;
            }

            state.currentQuestion++;
            state.canAnswer = true;
            document.getElementById('feedback-text').textContent = '';
            answerInput.value = '';
            answerInput.classList.remove('error-shake');
            answerInput.focus();

            document.getElementById('progress-display').textContent = `שאלה ${state.currentQuestion} מתוך ${state.totalQuestions}`;

            const num1 = state.selectedNumbers[Math.floor(Math.random() * state.selectedNumbers.length)];
            const num2 = Math.floor(Math.random() * 10) + 1;
            
            state.correctAnswer = num1 * num2;
            document.getElementById('question-text').textContent = `${num1} × ${num2}`;
        }

        function handleCheck() {
            if (!state.canAnswer) return;
            const playerAnswer = parseInt(answerInput.value);
            if (isNaN(playerAnswer)) return;

            if (playerAnswer === state.correctAnswer) {
                state.canAnswer = false;
                spawnRabbits(state.correctAnswer);
                state.rabbitTotal += state.correctAnswer;
                document.getElementById('rabbit-count').textContent = state.rabbitTotal;
                setTimeout(nextQuestion, 1800);
            } else {
                answerInput.classList.add('error-shake');
                document.getElementById('feedback-text').textContent = 'טעות, נסה שוב!';
                setTimeout(() => answerInput.classList.remove('error-shake'), 400);
                answerInput.value = '';
                answerInput.focus();
            }
        }

        document.getElementById('check-btn').onclick = handleCheck;
        answerInput.onkeydown = (e) => { if(e.key === 'Enter') handleCheck(); };

        function spawnRabbits(count) {
            const visualCount = Math.min(count, 50); 
            for (let i = 0; i < visualCount; i++) {
                setTimeout(() => {
                    const r = document.createElement('div');
                    r.className = 'rabbit-sprite';
                    r.textContent = '🐰';
                    r.style.left = (20 + Math.random() * 60) + '%';
                    r.style.bottom = '-50px';
                    document.body.appendChild(r);

                    r.animate([
                        { transform: 'translateY(0) scale(0)', opacity: 0 },
                        { transform: 'translateY(-150px) scale(1.5)', opacity: 1, offset: 0.3 },
                        { transform: 'translateY(100vh) scale(1)', opacity: 0 }
                    ], { duration: 2500, easing: 'ease-out' }).onfinish = () => r.remove();
                }, i * 25);
            }
        }
    </script>
</body>
</html>
